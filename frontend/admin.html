<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<header class="navbar">
    <div class="logo">Admin Dashboard</div>
    <button class="logout-btn" onclick="logout()">⎋Logout</button>
</header>

<section class="admin">
    <h1>📊 Bookings</h1>

    <div class="search-bar">
        <input type="text" id="searchInput" placeholder="Search by name...">

        <select id="filterTicket">
            <option value="">All Tickets</option>
            <option value="VIP">VIP</option>
            <option value="1 Day Pass">1 Day Pass</option>
            <option value="3 Day Pass">3 Day Pass</option>
        </select>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Phone</th>
                <th>Ticket</th>
                <th>Qty</th>
                <th>Total</th>
            </tr>
        </thead>
        <tbody id="bookingTable">
            <!-- Data comes here -->
        </tbody>
    </table>
</section>

<section class="admin">
    <h2>➕ Add Vendor</h2>

    <div class="vendor-form">
        <input type="text" id="vendorName" placeholder="Vendor Name">

        <select id="vendorCategory">
            <option value="Food">Food</option>
            <option value="Drinks">Drinks</option>
            <option value="Merch">Merch</option>
        </select>

        <input type="text" id="vendorLocation" placeholder="Location (Stage A / Food Court)">

        <button onclick="addVendor()">➕Add Vendor</button>
    </div>
</section>

<div class="vendor-container">
    <h2>📋 Vendor List</h2>

    <div class="table-wrapper">
        <table id="vendorTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Category</th>
                    <th>Location</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>


<h2 style="margin-top:40px;">📊 Crowd Control</h2>

<div class="vendor-container">
    <h2>📊 Crowd Control</h2>

    <div class="crowd-control">
        <select id="stage">
            <option value="Main Stage">Main Stage</option>
            <option value="Stage B">Stage B</option>
            <option value="Food Court">Food Court</option>
        </select>

        <select id="status">
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>

        <button onclick="updateCrowd()">Update</button>
    </div>
</div>

<script src="js/admin.js"></script>

</body>
</html>
